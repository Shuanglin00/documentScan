name: Deploy

on:
  push:
    branches:
      - main
    tags:
      - 'v*'

jobs:
  deploy:
    runs-on: self-hosted

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build and Deploy
        run: |
          echo "=== Building and Deploying ==="

          # 使用 Docker 多阶段构建（WSL 无需安装 Maven/JDK）
          docker build -t documentscan:latest .

          # 停止旧容器
          docker stop documentscan 2>/dev/null || true
          docker rm documentscan 2>/dev/null || true

          # 启动新容器
          docker run -d \
            --name documentscan \
            --restart unless-stopped \
            -p 8080:8080 \
            -e APP_ENV=production \
            -e LOG_LEVEL=INFO \
            -e MONGODB_URI="${{ secrets.MONGODB_URI }}" \
            -e MILVUS_HOST="${{ secrets.MILVUS_HOST }}" \
            -e MILVUS_PORT="${{ secrets.MILVUS_PORT }}" \
            -e REDIS_HOST="${{ secrets.REDIS_HOST }}" \
            -e REDIS_PORT="${{ secrets.REDIS_PORT }}" \
            -e REDIS_PASSWORD="${{ secrets.REDIS_PASSWORD }}" \
            -e OLLAMA_BASE_URL="${{ secrets.OLLAMA_BASE_URL }}" \
            -e OLLAMA_API_KEY="${{ secrets.OLLAMA_API_KEY }}" \
            -e OLLAMA_CHAT_MODEL="${{ secrets.OLLAMA_CHAT_MODEL }}" \
            -e OLLAMA_EMBEDDING_MODEL="${{ secrets.OLLAMA_EMBEDDING_MODEL }}" \
            -e SERVER_HOST="0.0.0.0" \
            -e SERVER_PORT="8080" \
            documentscan:latest

          sleep 5
          docker ps | grep documentscan

      - name: Health Check
        run: |
          for i in {1..10}; do
            if curl -sf http://localhost:8080/health > /dev/null 2>&1; then
              echo "Health check passed"
              exit 0
            fi
            echo "Attempt $i/10..."
            sleep 5
          done
          echo "Health check failed"
          docker logs documentscan
          exit 1
