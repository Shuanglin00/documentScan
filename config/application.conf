# DocumentScan Application Configuration
# This is the template configuration file
# Actual values are injected via environment variables during CI/CD deployment

app {
  name = "DocumentScan"
  version = "1.0.0"
  environment = ${?APP_ENV}
  environment = "development"
}

# MongoDB Configuration
mongodb {
  uri = ${?MONGODB_URI}
  uri = "mongodb://root:example@localhost:27017/catBot?authSource=admin"
  database = "catBot"
  auto-index-creation = false

  connection-pool {
    min-size = 10
    max-size = 100
    max-wait-time = 2000
    max-connection-life-time = 0
  }
}

# Milvus Vector Database Configuration
milvus {
  host = ${?MILVUS_HOST}
  host = "localhost"
  port = ${?MILVUS_PORT}
  port = 19530
  db-name = "milvus_local"
  collection-name = "embeddings_local"
  enable = true

  # Dense vector configuration (for semantic search)
  dense-vector {
    dimension = 1024
    index-type = "IVF_FLAT"
    metric-type = "COSINE"
  }

  # Sparse vector configuration (for keyword search)
  sparse-vector {
    index-type = "SPARSE_INVERTED_INDEX"
    metric-type = "IP"
  }
}

# Redis Configuration
redis {
  host = ${?REDIS_HOST}
  host = "localhost"
  port = ${?REDIS_PORT}
  port = 6379
  password = ${?REDIS_PASSWORD}
  database = 0
  timeout = 2000

  connection-pool {
    max-active = 8
    max-idle = 8
    min-idle = 0
  }
}

# AI / LLM Configuration (Ollama)
ai {
  ollama {
    base-url = ${?OLLAMA_BASE_URL}
    base-url = "http://localhost:11434"
    api-key = ${?OLLAMA_API_KEY}
    api-key = ""

    # Default models
    chat-model = ${?OLLAMA_CHAT_MODEL}
    chat-model = "qwen3:8b"

    embedding-model = ${?OLLAMA_EMBEDDING_MODEL}
    embedding-model = "bge-m3"

    timeout = 60
  }
}

# Server Configuration
server {
  port = ${?SERVER_PORT}
  port = 8080
  host = ${?SERVER_HOST}
  host = "0.0.0.0"
}

# Logging Configuration
logging {
  level = ${?LOG_LEVEL}
  level = "INFO"

  # Log format: json | text
  format = "text"
}
