# DocumentScan Application Configuration
# Environment variables override these defaults

app {
  name = "DocumentScan"
  version = "1.0.0"
  environment = ${?APP_ENV}
  environment = "development"
}

mongodb {
  uri = ${?MONGODB_URI}
  uri = "mongodb://root:example@localhost:27017/catBot?authSource=admin"
  database = "catBot"
  auto-index-creation = false
}

milvus {
  host = ${?MILVUS_HOST}
  host = "localhost"
  port = ${?MILVUS_PORT}
  port = 19530
  db-name = "milvus_local"
  collection-name = "embeddings_local"
  enable = true
}

redis {
  host = ${?REDIS_HOST}
  host = "localhost"
  port = ${?REDIS_PORT}
  port = 6379
  password = ${?REDIS_PASSWORD}
  database = 0
  timeout = 2000
}

ai {
  ollama {
    base-url = ${?OLLAMA_BASE_URL}
    base-url = "http://localhost:11434"
    api-key = ${?OLLAMA_API_KEY}
    api-key = ""
    chat-model = ${?OLLAMA_CHAT_MODEL}
    chat-model = "qwen3:8b"
    embedding-model = ${?OLLAMA_EMBEDDING_MODEL}
    embedding-model = "bge-m3"
    timeout = 60
  }
}

server {
  port = ${?SERVER_PORT}
  port = 8080
  host = ${?SERVER_HOST}
  host = "0.0.0.0"
}

logging {
  level = ${?LOG_LEVEL}
  level = "INFO"
}
